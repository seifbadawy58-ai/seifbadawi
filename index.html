<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEIF BADAWI | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --sidebar-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; scroll-behavior: smooth; overflow-x: hidden;
        }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000;
            height: 75px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-box { font-weight: 900; font-size: 22px; color: var(--accent-color); letter-spacing: 1px; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .lang-btn { cursor: pointer; font-size: 20px; color: #94a3b8; background: none; border: none; transition: 0.3s; }
        .lang-btn:hover { color: var(--accent-color); }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: var(--sidebar-bg); z-index: 2000; transition: var(--transition);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 50px 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-links a {
            display: flex; align-items: center; padding: 18px 30px; color: #94a3b8;
            text-decoration: none; transition: 0.3s; gap: 15px; font-size: 16px;
        }
        .sidebar-links a:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent-color); }

        /* Hero Section */
        .hero { text-align: center; padding: 100px 5% 60px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; background: linear-gradient(to right, #fff, var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: #94a3b8; font-size: 1.2rem; max-width: 600px; margin: 20px auto; }

        /* Grid */
        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; padding: 0 10% 80px;
        }

        .card {
            background: #1e293b60; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; overflow: hidden; transition: 0.4s; cursor: pointer;
            position: relative; height: 380px;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-color); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .img-box { height: 280px; width: 100%; background: #0f172a; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .img-box img { scale: 1.05; }

        .users-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            padding: 6px 14px; border-radius: 30px; font-size: 12px;
            color: #fff; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 8px; z-index: 2;
        }
        html[dir="ltr"] .users-badge { right: auto; left: 15px; }

        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 18px; color: var(--text-main); }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 3000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); align-items: center; justify-content: center;
        }
        .modal-box {
            background: #111827; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 450px; text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.2); position: relative;
        }
        .close-btn { position: absolute; top: 20px; left: 20px; color: #fff; cursor: pointer; font-size: 24px; }
        html[dir="ltr"] .close-btn { left: auto; right: 20px; }

        .choice-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            text-decoration: none; font-weight: bold; border: none; transition: 0.3s;
        }
        .btn-wa { background: #22c55e; color: white; }
        .btn-view { background: #38bdf8; color: #000; }

        .feedback-section { margin-top: 25px; border-top: 1px solid #ffffff10; padding-top: 20px; }
        .feedback-input {
            width: 100%; padding: 15px; border-radius: 12px; background: #1f2937;
            border: 1px solid #374151; color: white; resize: none; box-sizing: border-box;
        }
        .btn-send { background: none; border: 1px solid var(--accent-color); color: var(--accent-color); width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-send:hover { background: var(--accent-color); color: #000; }

        #fullImgModal img { max-width: 95%; max-height: 85%; border-radius: 15px; border: 1px solid var(--accent-color); }

    </style>
</head>
<body>

<header>
    <div class="logo-box">SEIF BADAWI</div>
    <div class="header-actions">
        <button class="lang-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i></button>
        <div onclick="toggleSidebar()" style="cursor:pointer; color:var(--accent-color); font-size: 22px;"><i class="fas fa-bars-staggered"></i></div>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div style="width: 60px; height: 60px; border: 2px solid var(--accent-color); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 20px;">SB</div>
        <h2 style="margin-top:15px; font-size:18px;">SEIF BADAWI</h2>
    </div>
    <div class="sidebar-links">
        <a href="#" onclick="toggleSidebar()"><i class="fas fa-home"></i> <span class="lang-text" data-ar="الرئيسية" data-en="Home">الرئيسية</span></a>
        <a href="#portfolio" onclick="toggleSidebar()"><i class="fas fa-layer-group"></i> <span class="lang-text" data-ar="معرض الأعمال" data-en="Portfolio">معرض الأعمال</span></a>
    </div>
</div>

<div class="hero">
    <h1 id="heroTitle">عالم من الإبداع</h1>
    <p id="heroDesc">أصمم هويات بصرية تعكس احترافية عملك وتخطف الأنظار.</p>
</div>

<div class="projects-grid" id="grid">
    </div>

<footer style="text-align: center; padding: 50px; color: #475569; font-size: 14px; border-top: 1px solid #ffffff05;">
    © 2026 SEIF BADAWI Portfolio
</footer>

<div class="modal" id="optionsModal">
    <div class="modal-box">
        <div class="close-btn" onclick="closeModals()">&times;</div>
        <h3 id="modalTitle" style="color:#fff; margin-bottom:20px;">اسم المشروع</h3>
        
        <a href="https://wa.me/201200819703" class="choice-btn btn-wa"><i class="fab fa-whatsapp"></i> <span class="lang-text" data-ar="طلب تصميم مشابه" data-en="Request Similar Design">طلب تصميم مشابه</span></a>
        <button class="choice-btn btn-view" onclick="openFullImage()"><i class="fas fa-expand-alt"></i> <span class="lang-text" data-ar="عرض الصورة كاملة" data-en="View Full Image">عرض الصورة كاملة</span></button>

        <div class="feedback-section">
            <textarea id="feedbackMsg" class="feedback-input" rows="3" placeholder="اكتب رأيك أو نصيحتك هنا..."></textarea>
            <button class="btn-send" onclick="sendFeedback()"><i class="fas fa-paper-plane"></i> <span class="lang-text" data-ar="إرسال النصيحة" data-en="Send Feedback">إرسال النصيحة</span></button>
        </div>
    </div>
</div>

<div class="modal" id="fullImgModal" onclick="closeModals()">
    <img src="" id="targetFullImg">
</div>

<script>
    let currentLang = 'ar';
    let activeImageUrl = '';

    // مصفوفة المشاريع بناءً على صورك الستة
    const myProjects = [
        { nameAr: "عالم الموشن جرافيك", nameEn: "Motion Graphics World", users: 154, url: "ضع_رابط_الصورة_الأولى_هنا" },
        { nameAr: "تصاميم تيشرتات إبداعية", nameEn: "Apparel & T-shirt Design", users: 89, url: "ضع_رابط_الصورة_الثانية_هنا" },
        { nameAr: "هوية مطاعم وكافيهات", nameEn: "Restaurant Branding", users: 120, url: "ضع_رابط_الصورة_الثالثة_هنا" },
        { nameAr: "تصميم أغلفة المجلات", nameEn: "Magazine Cover Design", users: 67, url: "ضع_رابط_الصورة_الرابعة_هنا" },
        { nameAr: "لوجوهات قطاع الأغذية", nameEn: "Food Industry Logos", users: 210, url: "ضع_رابط_الصورة_الخامسة_هنا" },
        { nameAr: "هوية بصرية ورسوم توضيحية", nameEn: "Visual Identity & Illustrations", users: 95, url: "ضع_رابط_الصورة_السادسة_هنا" }
    ];

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        myProjects.forEach((p, i) => {
            const name = currentLang === 'ar' ? p.nameAr : p.nameEn;
            const userTxt = currentLang === 'ar' ? 'مستخدم' : 'Users';
            grid.innerHTML += `
                <div class="card" onclick="openOptions('${name}', '${p.url}')">
                    <div class="users-badge"><i class="fas fa-users"></i> +${p.users} ${userTxt}</div>
                    <div class="img-box"><img src="${p.url}" alt="${name}"></div>
                    <div class="card-info"><h3>${name}</h3></div>
                </div>
            `;
        });
    }

    function openOptions(name, url) {
        document.getElementById('modalTitle').innerText = name;
        activeImageUrl = url;
        document.getElementById('feedbackMsg').value = '';
        document.getElementById('optionsModal').style.display = 'flex';
    }

    function openFullImage() {
        document.getElementById('optionsModal').style.display = 'none';
        document.getElementById('targetFullImg').src = activeImageUrl;
        document.getElementById('fullImgModal').style.display = 'flex';
    }

    function sendFeedback() {
        const msg = document.getElementById('feedbackMsg').value;
        const project = document.getElementById('modalTitle').innerText;
        if(!msg) return;
        window.open(`https://wa.me/201200819703?text=نصيحة بخصوص مشروع ${project}: %0a${msg}`);
    }

    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('htmlTag');
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        
        document.getElementById('heroTitle').innerText = currentLang === 'ar' ? 'عالم من الإبداع' : 'World of Creativity';
        document.getElementById('heroDesc').innerText = currentLang === 'ar' ? 'أصمم هويات بصرية تعكس احترافية عملك وتخطف الأنظار.' : 'I design visual identities that reflect your professionalism.';
        
        document.querySelectorAll('.lang-text').forEach(el => {
            el.innerText = el.getAttribute(`data-${currentLang}`);
        });
        render();
    }

    render();
</script>

</body>
</html>
